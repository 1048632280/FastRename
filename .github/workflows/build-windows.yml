name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    name: Build installer and portable exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri NSIS installer
        run: pnpm exec tauri build --bundles nsis

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item -LiteralPath src-tauri/target/release/fastrename.exe -Destination artifacts/FastRename-portable.exe
          Copy-Item -Path src-tauri/target/release/bundle/nsis/*.exe -Destination artifacts/
          Get-ChildItem artifacts

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FastRename-windows
          path: artifacts/*
          if-no-files-found: error
